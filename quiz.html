<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZ</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>
<body>
    <header>
        
        <h1>☑ Basic HTML and CSS Quiz</h1>
    </header>
    <main>
        <form>
            <fieldset>
                
                <ol>
                    <li>
                        <div class="form-item">
                            <label for="q1">What does the acronym HTML stand for?</label><br>
                        <input type="text" name="q1" id="q1">
                        </div>
                    </li>
                    <li>
                        <div class="form-item">
                            <label for="q2">How are id and class attributes selected in CSS?</label><br>
                            <textarea name="q2" id="q2"></textarea>
                        </div>
                    </li>
                    <li>
                        <div class="form-item">
                            <label for="q3">Which of the following is a valid CSS comment?</label><br>
                            <select name="q3" id="q3">
                                <option value="" selected disabled>Choose One ...</option>
                                <option value="html">&lt;!-- ... --></option>
                                <option value="css">/* ... */</option>
                                <option value="java">// ...</option>
                                <option value="python"># ...</option>
                            </select>
                        </div>
                    </li>
                    <li>
                        <div class="form-item">
                            <label for="q4">What is the bottom margin given this declaration?</label><br>
                            <p>margin: 10px 5px 15px;</p>
                            <input type="number" name="q4" id="q4">
                        </div>
                    </li>
                </ol>
                    
            </fieldset>
            <button type="submit">Submit Quiz</button>
        </form>
    </main>
    <footer>

    </footer>
</body>
</html>
